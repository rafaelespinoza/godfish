name: cassandra
on: [push, pull_request]
jobs:
  v4:
    name: cassandra_v4
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Install just
        uses: extractions/setup-just@v3
      - name: Build environment and run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just -f ci.Justfile cassandra4-up
      - name: Upload code coverage
        uses: codecov/codecov-action@v5
        env:
          DATADIR: .ci/.test_coverage/cassandra_v4
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ${{ env.DATADIR }}/cover.out,${{ env.DATADIR }}/integration.out,${{ env.DATADIR }}/cover_driver.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Teardown
        run: just -f ci.Justfile cassandra4-down
  v5:
    name: cassandra_v5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Install just
        uses: extractions/setup-just@v3
      - name: Build environment and run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just -f ci.Justfile cassandra5-up
      - name: Upload code coverage
        uses: codecov/codecov-action@v5
        env:
          DATADIR: .ci/.test_coverage/cassandra_v5
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ${{ env.DATADIR }}/cover.out,${{ env.DATADIR }}/integration.out,${{ env.DATADIR }}/cover_driver.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Teardown
        run: just -f ci.Justfile cassandra5-down
