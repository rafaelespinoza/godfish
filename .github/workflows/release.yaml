name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # needed by goreleaser to create a GitHub release
  id-token: write # needed by cosign for signing artifacts

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25
      - name: Get, tidy dependencies
        run: go mod tidy
      - name: Install goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          install-only: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Install just
        uses: extractions/setup-just@v3
      - name: Build signed release
        run: just release-signed '--snapshot=false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
