name: postgres
on: [push, pull_request]
permissions: {}
jobs:
  v15:
    name: postgres v15
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - name: Checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Build environment and run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just -f ci.Justfile postgres15-up
      - name: Upload code coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        env:
          DATADIR: .ci/.test_coverage/postgres_v15
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ${{ env.DATADIR }}/cover.out,${{ env.DATADIR }}/integration.out,${{ env.DATADIR }}/cover_driver.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Teardown
        run: just -f ci.Justfile postgres15-down
  v16:
    name: postgres v16
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - name: Checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Build environment and run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just -f ci.Justfile postgres16-up
      - name: Upload code coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        env:
          DATADIR: .ci/.test_coverage/postgres_v16
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ${{ env.DATADIR }}/cover.out,${{ env.DATADIR }}/integration.out,${{ env.DATADIR }}/cover_driver.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Teardown
        run: just -f ci.Justfile postgres16-down
